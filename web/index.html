<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Star Combiner</title>
    <link rel="stylesheet" href="style.css" />
    <script src="/eel.js"></script>
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="topbar glass">
      <h1>Telegram Star</h1>
      <p>Темная панель управления Telegram аккаунтами</p>
    </header>

    <main class="grid">
      <section class="card glass">
        <h2>Добавить аккаунт</h2>
        <div class="form-grid">
          <input id="name" placeholder="Имя аккаунта (alias)" />
          <input id="api_id" placeholder="API ID" />
          <input id="api_hash" placeholder="API HASH" />
          <input id="phone" placeholder="Телефон (+7999...)" />
          <button id="addBtn">Добавить</button>
        </div>
      </section>

      <section class="card glass">
        <h2>Аккаунты</h2>
        <div id="accounts" class="account-list"></div>
      </section>

      <section class="card glass wide">
        <h2>Управление</h2>
        <div class="form-grid manage-grid">
          <select id="selectedAccount"></select>
          <input id="code" placeholder="Код Telegram" />
          <input id="password" placeholder="Пароль 2FA (если есть)" />
          <button id="reqCodeBtn">Запросить код</button>
          <button id="signinBtn">Войти</button>
        </div>

        <div class="form-grid send-grid">
          <input id="target" placeholder="Получатель (@username/id)" />
          <textarea id="text" placeholder="Текст сообщения"></textarea>
          <button id="sendBtn">Отправить сообщение</button>
          <button id="dialogsBtn">Показать диалоги</button>
        </div>

        <pre id="output" class="output"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
