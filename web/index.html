<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Star</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="/eel.js"></script>
  </head>
  <body data-theme="gray">
    <div class="app">
      <header class="top card compact">
        <div class="logo-wrap">
          <div class="logo-star" aria-label="Telegram Star logo"></div>
          <div>
            <h1>Telegram Star</h1>
            <p>Automated Combiner</p>
          </div>
        </div>
      </header>

      <main class="main">
        <section class="tab active" data-panel="home">
          <div class="card compact"><div class="stats" id="stats"></div></div>
          <div class="card compact"><h3>Функции</h3><div id="homeFeatures" class="features-vertical"></div></div>
        </section>

        <section class="tab" data-panel="accounts">
          <div class="card compact toolbar-row">
            <input id="searchInput" placeholder="Поиск: имя / @username / ID / лимиты" />
            <button id="openImportModal" class="btn"><i class="ri-upload-2-line"></i> Импорт</button>
            <button id="openFilterModal" class="btn ghost"><i class="ri-filter-3-line"></i></button>
          </div>
          <div class="card compact"><div id="statusPills" class="status-pills"></div></div>
          <div id="accountsList" class="accounts-vertical"></div>
          <div id="pagination" class="pagination-center"></div>
        </section>

        <section class="tab" data-panel="tools">
          <div class="card compact"><div id="toolsList" class="features-vertical"></div></div>
        </section>

        <section class="tab" data-panel="numbers">
          <div class="card compact"><h3>Номера</h3><p class="muted">Интеграция API сервиса смены номера.</p></div>
        </section>

        <section class="tab" data-panel="settings">
          <div class="settings-tabs card compact">
            <button class="set-tab active" data-set-tab="theme"><i class="ri-palette-line"></i> Тема</button>
            <button class="set-tab" data-set-tab="api"><i class="ri-key-2-line"></i> API</button>
            <button class="set-tab" data-set-tab="devices"><i class="ri-smartphone-line"></i> Устройства</button>
            <button class="set-tab" data-set-tab="tags"><i class="ri-price-tag-3-line"></i> Теги</button>
          </div>

          <div class="set-panel active card compact" data-set-panel="theme">
            <div class="theme-pills">
              <button class="pill active" data-theme="gray">Серая</button>
              <button class="pill" data-theme="yellow">Желтая</button>
              <button class="pill" data-theme="blue">Голубая</button>
            </div>
          </div>

          <div class="set-panel card compact" data-set-panel="api">
            <div class="line3"><input id="apiId" placeholder="api_id" /><input id="apiHash" placeholder="api_hash" /><button id="saveApiBtn" class="btn">Сохранить</button></div>
          </div>

          <div class="set-panel card compact" data-set-panel="devices">
            <div class="line3"><select id="devicePresetSelect"></select><button id="saveDevicePresetBtn" class="btn">Применить</button><div></div></div>
            <div id="devicePresetInfo" class="device-info"></div>
          </div>

          <div class="set-panel card compact" data-set-panel="tags">
            <div class="line3"><input id="tagName" placeholder="Название тега" /><input id="tagColor" type="color" value="#8dd17e" /><button id="addTagBtn" class="btn">Добавить</button></div>
            <div id="tagList" class="tag-list"></div>
          </div>
        </section>
      </main>

      <nav id="nav" class="dock card compact">
        <button class="dock-item active" data-tab="home"><i class="ri-home-5-line"></i><span>Главная</span></button>
        <button class="dock-item" data-tab="accounts"><i class="ri-group-2-line"></i><span>Аккаунты</span></button>
        <button class="dock-item" data-tab="tools"><i class="ri-hammer-line"></i><span>Инструменты</span></button>
        <button class="dock-item" data-tab="numbers"><i class="ri-sim-card-2-line"></i><span>Номера</span></button>
        <button class="dock-item" data-tab="settings"><i class="ri-settings-4-line"></i><span>Настройки</span></button>
      </nav>
    </div>

    <div id="importModal" class="modal hidden">
      <div class="modal-box card compact">
        <h3>Импорт аккаунтов</h3>

        <div class="import-card">
          <div class="line3">
            <input id="importPrefix" placeholder="Префикс (опционально)" />
            <label class="file-btn" for="sessionInput"><i class="ri-file-upload-line"></i> Выбрать .session</label>
            <small class="muted">Импорт начнется автоматически</small>
          </div>
          <input id="sessionInput" class="file-hidden" type="file" multiple accept=".session" />
        </div>

        <div class="import-card">
          <div class="line3">
            <input id="tdataName" placeholder="Имя пакета tdata" />
            <label class="file-btn" for="tdataInput"><i class="ri-folder-open-line"></i> Выбрать папку tdata</label>
            <small class="muted">Импорт начнется автоматически</small>
          </div>
          <input id="tdataInput" class="file-hidden" type="file" webkitdirectory directory multiple />
        </div>

        <button id="openAuthModal" class="btn ghost"><i class="ri-lock-password-line"></i> Ручной вход (как окно регистрации)</button>
      </div>
    </div>

    <div id="authModal" class="modal hidden">
      <div class="auth-sheet card compact">
        <h3>Вход в Telegram</h3>
        <p class="muted">Выберите аккаунт в списке и введите код. Поле пароля появится только при необходимости.</p>
        <div class="line3"><input id="accCode" placeholder="Код из Telegram" /><button id="requestCodeBtn" class="btn ghost">Получить код</button><button id="signInBtn" class="btn">Продолжить</button></div>
        <div id="passwordWrap" class="hidden"><input id="accPassword" placeholder="Пароль 2FA" /></div>
        <div class="line3"><input id="msgTarget" placeholder="@username / ID" /><input id="msgText" placeholder="Текст" /><button id="sendMessageBtn" class="btn">Отправить</button></div>
      </div>
    </div>

    <div id="filterModal" class="modal hidden">
      <div class="modal-box card compact">
        <h3>Фильтры</h3>
        <div class="filters-grid">
          <div class="fcard"><label>Premium</label><div class="tri"><button data-f="premium:any" class="opt active">Любой</button><button data-f="premium:no" class="opt">Нет</button><button data-f="premium:yes" class="opt">Да</button></div></div>
          <div class="fcard"><label>2FA</label><div class="tri"><button data-f="has2fa:any" class="opt active">Любой</button><button data-f="has2fa:no" class="opt">Нет</button><button data-f="has2fa:yes" class="opt">Да</button></div></div>
        </div>
        <button id="applyFiltersBtn" class="btn">Применить</button>
      </div>
    </div>

    <div id="accountModal" class="modal hidden">
      <div class="mobile-sheet card compact">
        <div class="profile-head">
          <div class="avatar-lg" id="modalAvatar">A</div>
          <strong id="modalName">Account</strong>
          <button id="modalIdentity" class="identity-btn">id / @user</button>
        </div>
        <div id="modalInfo" class="meta-list"></div>
        <div class="download-wrap">
          <button id="downloadBtn" class="download-main">Скачать</button>
          <div id="downloadMenu" class="download-menu hidden">
            <button data-format="telethon">telethon</button>
            <button data-format="pyrogram">pyrogram</button>
            <button data-format="tdata">tdata</button>
          </div>
        </div>
        <div class="line4"><button id="recheckBtn" class="btn ghost">Проверить</button><button id="removeBtn" class="btn danger">Удалить</button><button id="closeAccountModal" class="btn ghost">Закрыть</button><span></span></div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="app.js"></script>
  </body>
</html>
